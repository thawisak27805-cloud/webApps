<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบงานอภิบาลและการพินิจ</title>
  <style>
    :root { --bg:#f3f6fb;--surface:#fff;--text:#1e293b;--muted:#64748b;--border:#d9e2ef;--primary:#1d4f91;--danger:#b42318;--success:#0e7490;--warning:#92400e;--info:#0c4a6e;--radius:12px;--shadow:0 10px 24px rgba(15,23,42,.08); }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:"Noto Sans Thai","Sarabun",system-ui,sans-serif}
    .app{min-height:100vh;display:grid;grid-template-columns:280px 1fr}.sidebar{background:linear-gradient(180deg,#123b6c 0%,#1d4f91 100%);color:#fff;padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto}
    .brand{border-bottom:1px solid rgba(255,255,255,.25);margin-bottom:14px;padding:6px 8px 14px}.brand h1{margin:0;font-size:18px}.brand p{margin:6px 0 0;font-size:13px;opacity:.9}
    .menu{display:flex;flex-direction:column;gap:8px}.menu button{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.1);color:#fff;border-radius:10px;padding:10px 12px;text-align:left;cursor:pointer}.menu button.active,.menu button:hover{background:rgba(255,255,255,.22)}
    .main{padding:16px;display:flex;flex-direction:column;gap:12px}.header,.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
    .header{padding:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.header h2{margin:0}.meta{color:var(--muted);font-size:13px}
    .card{padding:14px}.toolbar,.toolbar2{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.toolbar2{margin-top:8px}
    .btn{border:1px solid var(--border);background:#fff;color:var(--text);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:14px}.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}.btn.danger{background:#fff5f5;color:var(--danger);border-color:#f4c7c7}.btn.info{background:#eff6ff;color:var(--info);border-color:#bfdbfe}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px}.badge.ok{background:#ecfeff;color:var(--success);border:1px solid #bae6fd}.badge.empty{background:#f8fafc;color:var(--muted);border:1px solid #e2e8f0}
    input[type="text"],select,textarea{border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-size:14px;min-height:38px;width:100%}textarea{min-height:70px}
    .search-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center}.table-wrap{margin-top:12px;border:1px solid var(--border);border-radius:12px;overflow:auto}
    table{width:100%;border-collapse:collapse;min-width:980px}th,td{padding:10px;border-bottom:1px solid var(--border);font-size:14px}th{background:#f8fbff;text-align:left}td.center,th.center{text-align:center}.actions{display:flex;gap:6px;flex-wrap:wrap}
    .status{font-size:13px;margin-top:8px;min-height:20px}.status.success{color:var(--success)}.status.error{color:var(--danger)}.status.warn{color:var(--warning)}
    .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:3000;padding:16px}
    .modal{width:100%;max-width:900px;max-height:90vh;overflow:auto;background:#fff;border-radius:12px;border:1px solid var(--border);box-shadow:var(--shadow);padding:14px}
    .modal h3{margin:0 0 12px}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
    .attach-row{display:grid;grid-template-columns:1fr 1.4fr auto;gap:8px;align-items:center;margin-bottom:8px;padding:8px;border:1px solid var(--border);border-radius:10px;background:#f8fafc}
    .small{font-size:12px;color:var(--muted)}
    .placeholder{padding:24px;border:1px dashed var(--border);border-radius:10px;background:#f8fafc;text-align:center;color:var(--muted)}
    @media(max-width:1024px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.search-row{grid-template-columns:1fr}.grid-2,.attach-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><h1>ระบบงานอภิบาลและการพินิจ</h1><p>โครงสร้างพร้อมใช้งานและต่อยอด</p></div>
    <nav class="menu" id="menu"></nav>
  </aside>
  <main class="main">
    <section class="header">
      <div><h2 id="pageTitle">หน้าหลัก</h2><div class="meta" id="systemMeta">กำลังโหลดข้อมูลระบบ...</div></div>
      <div class="toolbar"><button class="btn" onclick="initializeSystem()">เตรียมระบบ</button></div>
    </section>
    <section class="card" id="contentArea"></section>
  </main>
</div>

<div class="modal-backdrop" id="youthModalBackdrop"><div class="modal" style="max-width:560px"><h3 id="youthModalTitle"></h3>
  <div class="field"><label>ชื่อนามสกุลเด็กและเยาวชน *</label><input type="text" id="youthFullName"></div>
  <div class="field"><label>ระดับชั้น *</label><input type="text" id="youthGradeLevel" placeholder="เช่น 1, 1/2, 1/3, 2/1"></div>
  <div class="grid-2"><div class="field"><label>หน่วยเรียนวิชาชีพ</label><select id="youthVocationUnit"></select></div><div class="field"><label>ครูที่ปรึกษา</label><select id="youthAdvisorTeacher"></select></div></div>
  <div class="status" id="youthFormStatus"></div><div class="modal-footer"><button class="btn" onclick="closeYouthModal()">ยกเลิก</button><button class="btn primary" onclick="submitYouthForm()">บันทึก</button></div></div></div>

<div class="modal-backdrop" id="docEditModal"><div class="modal">
  <h3 id="docEditTitle">จัดการเอกสาร</h3>
  <div class="grid-2"><div><strong id="docYouthName">-</strong><div class="small" id="docYouthAdvisor">-</div></div><div class="field"><label>หมายเหตุ</label><textarea id="docNote"></textarea></div></div>
  <div id="docEditBody"></div>
  <div class="status" id="docEditStatus"></div>
  <div class="modal-footer"><button class="btn" onclick="closeDocEditModal()">ปิด</button><button class="btn primary" onclick="submitDocEdit()">บันทึก</button></div>
</div></div>

<div class="modal-backdrop" id="docViewModal"><div class="modal" style="max-width:760px">
  <h3 id="docViewTitle">รายการเอกสาร</h3>
  <div id="docViewBody"></div>
  <div class="modal-footer"><button class="btn" onclick="closeDocViewModal()">ปิด</button></div>
</div></div>


<div class="modal-backdrop" id="activityModal"><div class="modal">
  <h3 id="activityModalTitle">เพิ่มกิจกรรม</h3>
  <div class="grid-2">
    <div class="field"><label>ประเภทกิจกรรม *</label><select id="actEventType" onchange="onActivityTypeChange()">
      <option value="COURT">นัดขึ้นศาล</option><option value="HOSPITAL">นัดไปโรงพยาบาล</option><option value="INTERNAL_YOUTH">กิจกรรมภายใน</option><option value="STAFF_ACTIVITY">กิจกรรมเจ้าหน้าที่</option><option value="DEADLINE">กำหนดส่งงาน</option>
    </select></div>
    <div class="field"><label>เด็กและเยาวชน (พิมพ์ค้นหาและเพิ่มได้หลายคน)</label><input type="text" id="actYouthSearch" list="actYouthList" placeholder="พิมพ์ชื่อเด็ก"><datalist id="actYouthList"></datalist><div class="toolbar2"><button class="btn" type="button" onclick="addYouthToActivity()">+ เพิ่มเด็ก</button></div><div id="actYouthSelected" class="small"></div></div>
  </div>
  <div class="grid-2"><div class="field"><label>ชื่อกิจกรรม/งาน *</label><input type="text" id="actTitle"></div><div class="field"><label>ผู้เกี่ยวข้อง/ใครทำ</label><input type="text" id="actPersonName"></div></div>
  <div class="grid-2"><div class="field"><label>บทบาทผู้เกี่ยวข้อง</label><select id="actRoleType"><option value="เด็กและเยาวชน">เด็กและเยาวชน</option><option value="เจ้าหน้าที่">เจ้าหน้าที่</option><option value="หน่วยงาน">หน่วยงาน</option><option value="อื่น ๆ" selected>อื่น ๆ</option></select></div><div class="field"><label>วันที่เริ่ม *</label><input type="date" id="actStartDate"></div></div>
  <div class="grid-2"><div class="field"><label>วันที่สิ้นสุด *</label><input type="date" id="actEndDate"></div><div class="field"><label><input type="checkbox" id="actAllDay"> กิจกรรมทั้งวัน</label></div></div>
  <div class="grid-2"><div class="field"><label>เวลาเริ่ม</label><input type="time" id="actStartTime"></div><div class="field"><label>เวลาสิ้นสุด</label><input type="time" id="actEndTime"></div></div>
  <div id="actTypeFields"></div>
  <div class="grid-2"><div class="field"><label>สถานที่</label><input type="text" id="actLocation"></div><div class="field"><label>ผู้รับผิดชอบ</label><input type="text" id="actTaskOwner"></div></div>
  <div class="field"><label>รายละเอียด</label><textarea id="actDescription"></textarea></div>
  <div class="small">หมายเหตุ: ระบบบันทึกกิจกรรมโดยไม่ใช้การแจ้งเตือน LINE</div>
  <div class="status" id="activityFormStatus"></div>
  <div class="modal-footer"><button class="btn" onclick="closeActivityModal()">ยกเลิก</button><button class="btn danger" id="activityDeleteBtn" onclick="deleteCurrentActivity()" style="display:none">ลบ</button><button class="btn primary" onclick="submitActivity()">บันทึก</button></div>
</div></div>

<input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" style="display:none" />

<script>
const MENUS=['หน้าหลัก','ข้อมูลเด็กและเยาวชน','เอกสารประเมินและ ปท.1','ตารางนัดกิจกรรม','งานญาติเยี่ยม','งานลงทัณฑ์','งานคลังวัสดุ','ตั้งค่าระบบ'];
const STATE={activeMenu:MENUS[0],youth:{query:'',limit:'25',rows:[],selectedIds:new Set(),mode:'create',editId:null,options:{vocations:[],advisors:[]}},doc:{query:'',limit:'25',rows:[],mode:'create',category:'ASSESSMENT',youthId:'',detailItems:[],attachmentsSeq:0},calendar:{view:'month',query:'',eventType:'',rangeType:'all',monthRef:new Date(),events:[],youthOptions:[],editId:null,selectedYouthIds:[]},visit:{month:(new Date().getMonth()+1),year:(new Date().getFullYear()+543),query:'',gradeLevel:'',statusFilter:'ALL',rows:[],youthOptions:[],gradeOptions:[],quotaRules:[],specialRules:[],importPreview:[]}};
const DOC_TYPES={ASSESSMENT:[{docType:'CONTROL_ASSESSMENT',itemName:'ประเมินระดับการควบคุม'}],PT1:[{docType:'PT1_DOCUMENT',itemName:'เอกสารใบ ปท.1'},{docType:'FRONT_PHOTO',itemName:'รูปถ่ายด้านหน้า'},{docType:'BACK_PHOTO',itemName:'รูปถ่ายด้านหลัง'}]};
let CALENDAR_LOAD_SEQ=0;

document.addEventListener('DOMContentLoaded',()=>{renderMenu();renderCurrentPage();loadSystemInfo();bindExcelInput();});

function renderMenu(){const m=document.getElementById('menu');m.innerHTML='';MENUS.forEach(menu=>{const b=document.createElement('button');b.textContent=menu;if(menu===STATE.activeMenu)b.classList.add('active');b.onclick=()=>{STATE.activeMenu=menu;renderMenu();renderCurrentPage();};m.appendChild(b);});}
function renderCurrentPage(){document.getElementById('pageTitle').textContent=STATE.activeMenu;if(STATE.activeMenu==='ข้อมูลเด็กและเยาวชน'){renderYouthPage();loadYouthOptionsAndData();return;}if(STATE.activeMenu==='เอกสารประเมินและ ปท.1'){renderDocumentPage();loadDocumentTable();return;}if(STATE.activeMenu==='ตารางนัดกิจกรรม'){renderCalendarPage();loadCalendarInitial();return;}if(STATE.activeMenu==='งานญาติเยี่ยม'){renderVisitPage();loadVisitDashboard();return;}renderPlaceholderPage(STATE.activeMenu);}
function renderPlaceholderPage(menuName){document.getElementById('contentArea').innerHTML=`<h3 style="margin:0 0 8px">${menuName}</h3><div class="badge ok">กำลังพัฒนา</div><div class="placeholder" style="margin-top:12px">หน้านี้อยู่ระหว่างพัฒนา</div>`;}
function loadSystemInfo(){google.script.run.withSuccessHandler(info=>{document.getElementById('systemMeta').textContent=`เวอร์ชัน ${info.version} • Spreadsheet: ${info.spreadsheetId} • Folder: ${info.folderId}`;}).withFailureHandler(()=>{document.getElementById('systemMeta').textContent='ไม่สามารถโหลดข้อมูลระบบได้';}).getSystemInfo();}
function initializeSystem(){google.script.run.withSuccessHandler(r=>{alert(r.message);if(STATE.activeMenu==='ข้อมูลเด็กและเยาวชน')loadYouthOptionsAndData();if(STATE.activeMenu==='เอกสารประเมินและ ปท.1')loadDocumentTable();}).withFailureHandler(e=>alert(e.message||e)).initSystem();}

/* Youth */
function renderYouthPage(){document.getElementById('contentArea').innerHTML=`<h3 style="margin:0 0 6px">ข้อมูลเด็กและเยาวชน</h3><div class="badge ok">พร้อมใช้งาน CRUD + Import</div>
<div class="toolbar2"><button class="btn primary" onclick="openYouthModal('create')">เพิ่มข้อมูล</button><button class="btn danger" onclick="deleteSelectedYouth()">ลบที่เลือก</button><button class="btn danger" onclick="deleteAllYouth()">ลบทั้งหมด</button><button class="btn" onclick="triggerImportExcel()">นำเข้า Excel</button><button class="btn" onclick="loadYouthList()">รีเฟรช</button></div>
<div class="search-row" style="margin-top:10px"><input id="youthSearchInput" type="text" placeholder="ค้นหา: ชื่อ, ระดับชั้น, หน่วยเรียนวิชาชีพ, ครูที่ปรึกษา"><select id="youthLimitSelect"><option value="10">10</option><option value="25" selected>25</option><option value="50">50</option><option value="100">100</option><option value="all">ทั้งหมด</option></select><button class="btn" onclick="searchYouth()">ค้นหา</button></div>
<div class="status" id="youthStatus"></div><div class="table-wrap"><table><thead><tr><th class="center"><input type="checkbox" id="checkAllYouth" onclick="toggleSelectAllYouth(this)"></th><th class="center">ลำดับ</th><th>ชื่อนามสกุลเด็กและเยาวชน</th><th>ระดับชั้น</th><th>หน่วยเรียนวิชาชีพ</th><th>ครูที่ปรึกษา</th><th>จัดการ</th></tr></thead><tbody id="youthTableBody"></tbody></table></div>`;
const s=document.getElementById('youthSearchInput');const l=document.getElementById('youthLimitSelect');s.value=STATE.youth.query;l.value=STATE.youth.limit;s.addEventListener('keydown',e=>{if(e.key==='Enter')searchYouth();});l.addEventListener('change',()=>{STATE.youth.limit=l.value;loadYouthList();});}
function setYouthStatus(msg,type){const el=document.getElementById('youthStatus');if(!el)return;el.className='status '+(type||'');el.textContent=msg||'';}
function loadYouthOptionsAndData(){setYouthStatus('กำลังโหลดข้อมูล...','warn');google.script.run.withSuccessHandler(v=>{STATE.youth.options.vocations=v||[];google.script.run.withSuccessHandler(a=>{STATE.youth.options.advisors=a||[];loadYouthList();}).withFailureHandler(e=>setYouthStatus(e.message||e,'error')).getAdvisorTeachers();}).withFailureHandler(e=>setYouthStatus(e.message||e,'error')).getVocationUnits();}
function searchYouth(){STATE.youth.query=(document.getElementById('youthSearchInput').value||'').trim();loadYouthList();}
function loadYouthList(){if(STATE.activeMenu!=='ข้อมูลเด็กและเยาวชน')return;STATE.youth.selectedIds.clear();setYouthStatus('กำลังโหลดรายการ...','warn');google.script.run.withSuccessHandler(res=>{STATE.youth.rows=res.items||[];renderYouthTable();setYouthStatus(`แสดง ${res.shown} จากทั้งหมด ${res.total} รายการ`,'success');}).withFailureHandler(e=>setYouthStatus(e.message||e,'error')).getYouthList({query:STATE.youth.query,limit:STATE.youth.limit});}
function renderYouthTable(){const tb=document.getElementById('youthTableBody');if(!tb)return;if(!STATE.youth.rows.length){tb.innerHTML='<tr><td colspan="7" class="center">ไม่พบข้อมูล</td></tr>';return;}tb.innerHTML=STATE.youth.rows.map((r,i)=>`<tr><td class="center"><input class="youth-checkbox" type="checkbox" value="${eH(r.youthId)}" onclick="toggleYouthSelection('${eJ(r.youthId)}',this.checked)"></td><td class="center">${i+1}</td><td>${eH(r.fullName)}</td><td>${eH(r.gradeLevel)}</td><td>${eH(r.vocationUnit||'-')}</td><td>${eH(r.advisorTeacher||'-')}</td><td><div class="actions"><button class="btn" onclick="openYouthModal('edit','${eJ(r.youthId)}')">แก้ไข</button><button class="btn danger" onclick="deleteYouthOne('${eJ(r.youthId)}')">ลบ</button></div></td></tr>`).join('');}
function toggleYouthSelection(id,c){if(c)STATE.youth.selectedIds.add(id);else STATE.youth.selectedIds.delete(id);}
function toggleSelectAllYouth(master){document.querySelectorAll('.youth-checkbox').forEach(cb=>{cb.checked=master.checked;if(master.checked)STATE.youth.selectedIds.add(cb.value);else STATE.youth.selectedIds.delete(cb.value);});}
function openYouthModal(mode,id){STATE.youth.mode=mode;STATE.youth.editId=id||null;document.getElementById('youthModalTitle').textContent=mode==='edit'?'แก้ไขข้อมูลเด็กและเยาวชน':'เพิ่มข้อมูลเด็กและเยาวชน';document.getElementById('youthFormStatus').textContent='';const row=mode==='edit'?STATE.youth.rows.find(r=>r.youthId===id):null;document.getElementById('youthFullName').value=row?row.fullName:'';document.getElementById('youthGradeLevel').value=row?row.gradeLevel:'';fillDropdown('youthVocationUnit',STATE.youth.options.vocations,row?row.vocationUnit:'');fillDropdown('youthAdvisorTeacher',STATE.youth.options.advisors,row?row.advisorTeacher:'');document.getElementById('youthModalBackdrop').style.display='flex';}
function closeYouthModal(){document.getElementById('youthModalBackdrop').style.display='none';}
function fillDropdown(id,items,selected){const s=document.getElementById(id);if(!items||!items.length){s.innerHTML='<option value="">ยังไม่มีข้อมูลในตั้งค่าระบบ</option>';s.disabled=true;return;}s.disabled=false;s.innerHTML=['<option value="">-- เลือก --</option>'].concat(items.map(it=>`<option value="${eH(it.name)}">${eH(it.name)}</option>`)).join('');s.value=selected||'';}
function setYouthFormStatus(msg,type){const el=document.getElementById('youthFormStatus');el.className='status '+(type||'');el.textContent=msg||'';}
function submitYouthForm(){const payload={fullName:document.getElementById('youthFullName').value.trim(),gradeLevel:normalizeGradeClient(document.getElementById('youthGradeLevel').value),vocationUnit:document.getElementById('youthVocationUnit').value,advisorTeacher:document.getElementById('youthAdvisorTeacher').value};if(!payload.fullName)return setYouthFormStatus('กรุณากรอกชื่อ','error');if(!payload.gradeLevel)return setYouthFormStatus('กรุณากรอกระดับชั้น','error');if(STATE.youth.mode==='edit'){payload.youthId=STATE.youth.editId;google.script.run.withSuccessHandler(()=>{closeYouthModal();loadYouthList();}).withFailureHandler(e=>setYouthFormStatus(e.message||e,'error')).updateYouth(payload);}else{google.script.run.withSuccessHandler(()=>{closeYouthModal();loadYouthList();}).withFailureHandler(e=>setYouthFormStatus(e.message||e,'error')).saveYouth(payload);}}
function deleteYouthOne(id){if(!confirmDeleteYouth_())return;google.script.run.withSuccessHandler(r=>{setYouthStatus(formatDeleteSummaryMessage_(r),'success');loadYouthList();}).withFailureHandler(e=>setYouthStatus(e.message||e,'error')).deleteYouthById(id);}
function deleteSelectedYouth(){const ids=Array.from(STATE.youth.selectedIds);if(!ids.length)return setYouthStatus('กรุณาเลือกรายการ','warn');if(!confirmDeleteYouth_())return;google.script.run.withSuccessHandler(r=>{setYouthStatus(formatDeleteSummaryMessage_(r),'success');loadYouthList();}).withFailureHandler(e=>setYouthStatus(e.message||e,'error')).deleteYouthByIds(ids);}
function deleteAllYouth(){if(!confirmDeleteYouth_())return;google.script.run.withSuccessHandler(r=>{setYouthStatus(formatDeleteSummaryMessage_(r),'success');loadYouthList();}).withFailureHandler(e=>setYouthStatus(e.message||e,'error')).deleteAllYouthRows();}
function confirmDeleteYouth_(){return confirm('การลบนี้จะลบข้อมูลเด็กและเยาวชน รวมถึงเอกสาร ไฟล์แนบ การจองเยี่ยม ตารางนัดกิจกรรม และข้อมูลที่เกี่ยวข้องทั้งหมด ไม่สามารถกู้คืนได้จากระบบ');}
function formatDeleteSummaryMessage_(r){if(!r)return'ลบข้อมูลสำเร็จ';if(r.message)return r.message;return['ลบข้อมูลเด็กและเยาวชน '+(r.youthDeleted||0)+' รายการ','ลบเอกสาร/metadata '+(r.docsDeleted||0)+' รายการ','ลบไฟล์ใน Drive '+(r.driveDeleted||0)+' ไฟล์ (ไม่สำเร็จ '+(r.driveFailed||0)+', ข้าม '+(r.driveSkipped||0)+')','ลบรายการจองเยี่ยม '+(r.visitDeleted||0)+' รายการ','ลบกิจกรรมที่เกี่ยวข้อง '+(r.activitiesDeleted||0)+' รายการ','มีข้อผิดพลาด '+((r.errors||[]).length||0)+' รายการ'].join('\\n');}
function bindExcelInput(){document.getElementById('excelFileInput').addEventListener('change',async()=>{const f=document.getElementById('excelFileInput').files[0];if(!f)return;try{setYouthStatus('กำลังนำเข้าไฟล์...','warn');const b=await fileToBase64(f);google.script.run.withSuccessHandler(r=>{const s=r.summary||{};setYouthStatus(`เพิ่ม ${s.inserted||0} อัปเดต ${s.updated||0} ข้าม ${s.skipped||0}`,'success');loadYouthList();}).withFailureHandler(e=>setYouthStatus(e.message||e,'error')).importYouthFromExcel(b,f.name,f.type||'application/octet-stream');}catch(e){setYouthStatus(e.message||e,'error');}finally{document.getElementById('excelFileInput').value='';}});}

function renderDocumentPage(){document.getElementById('contentArea').innerHTML=`<h3 style="margin:0 0 6px">เอกสารประเมินและ ปท.1</h3><div class="badge ok">เชื่อมข้อมูล youthId และจัดเก็บไฟล์บน Drive</div>
<div class="toolbar2"><button class="btn" onclick="loadDocumentTable()">รีเฟรช</button></div>
<div class="search-row" style="margin-top:10px"><input id="docSearchInput" type="text" placeholder="ค้นหา: ชื่อเด็กและเยาวชน หรือ ครูที่ปรึกษา"><select id="docLimitSelect"><option value="10">10</option><option value="25" selected>25</option><option value="50">50</option><option value="100">100</option><option value="all">ทั้งหมด</option></select><button class="btn" onclick="searchDocumentTable()">ค้นหา</button></div>
<div class="status" id="docStatus"></div><div class="table-wrap"><table><thead><tr><th class="center">ลำดับ</th><th>ชื่อนามสกุลเด็กและเยาวชน</th><th>ครูที่ปรึกษา</th><th>เอกสารประเมิน</th><th>ปท.1</th><th>วันที่อัปเดตล่าสุด</th></tr></thead><tbody id="docTableBody"></tbody></table></div>`;
const s=document.getElementById('docSearchInput');const l=document.getElementById('docLimitSelect');s.value=STATE.doc.query;l.value=STATE.doc.limit;s.addEventListener('keydown',e=>{if(e.key==='Enter')searchDocumentTable();});l.addEventListener('change',()=>{STATE.doc.limit=l.value;loadDocumentTable();});}
function setDocStatus(msg,type){const el=document.getElementById('docStatus');if(!el)return;el.className='status '+(type||'');el.textContent=msg||'';}
function searchDocumentTable(){STATE.doc.query=(document.getElementById('docSearchInput').value||'').trim();loadDocumentTable();}
function loadDocumentTable(){if(STATE.activeMenu!=='เอกสารประเมินและ ปท.1')return;setDocStatus('กำลังโหลดรายการ...','warn');google.script.run.withSuccessHandler(res=>{STATE.doc.rows=res.items||[];renderDocumentTable();setDocStatus(`แสดง ${res.shown} จากทั้งหมด ${res.total} รายการ`,'success');}).withFailureHandler(e=>setDocStatus(e.message||e,'error')).getYouthDocumentTable({query:STATE.doc.query,limit:STATE.doc.limit});}

function renderDocCell(row,cat){const has=cat==='ASSESSMENT'?row.hasAssessment:row.hasPt1;const add=`<button class="btn primary" onclick="openDocEditor('${eJ(row.youthId)}','${cat}','create')">เพิ่มเอกสาร</button>`;const edit=`<button class="btn" onclick="openDocEditor('${eJ(row.youthId)}','${cat}','edit')">แก้ไข</button>`;const view=`<button class="btn info" onclick="openDocView('${eJ(row.youthId)}','${cat}')">ดูเอกสาร</button>`;return has?`<div class="actions">${view}${edit}</div>`:`<div class="actions">${add}<span class="badge empty">ยังไม่มีเอกสาร</span></div>`;}

function openDocEditor(youthId,category,mode){STATE.doc.mode=mode;STATE.doc.category=category;STATE.doc.youthId=youthId;STATE.doc.attachmentsSeq=0;document.getElementById('docEditStatus').textContent='';const row=STATE.doc.rows.find(r=>r.youthId===youthId)||{};document.getElementById('docYouthName').textContent=row.fullName||'-';document.getElementById('docYouthAdvisor').textContent='ครูที่ปรึกษา: '+(row.advisorTeacher||'-');document.getElementById('docNote').value='';document.getElementById('docEditTitle').textContent=(mode==='edit'?'แก้ไข':'เพิ่ม')+'เอกสาร '+(category==='ASSESSMENT'?'ประเมิน':'ปท.1');

function buildDocEditorBody(){const body=document.getElementById('docEditBody');if(STATE.doc.category==='ASSESSMENT'){const old=STATE.doc.detailItems.find(i=>i.docType==='CONTROL_ASSESSMENT');body.innerHTML=`<div class="field"><label>ไฟล์ประเมินระดับการควบคุม *</label><input type="file" id="assessmentFile" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"></div>${old?`<div class="small">ไฟล์เดิม: ${eH(old.fileName)} <a href="${eH(old.fileUrl)}" target="_blank">ดูไฟล์</a></div>`:'<div class="small">ยังไม่มีไฟล์เดิม</div>'}`;return;}
let html='';
const base=DOC_TYPES.PT1.map(def=>{const old=STATE.doc.detailItems.find(i=>i.docType===def.docType);return `<div class="attach-row" data-doctype="${def.docType}"><input type="text" class="pt1-item-name" value="${eH(def.itemName)}" readonly><div><input type="file" class="pt1-file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"><div class="small">${old?`ไฟล์เดิม: ${eH(old.fileName)} <a href="${eH(old.fileUrl)}" target="_blank">ดูไฟล์</a>`:'ยังไม่มีไฟล์เดิม'}</div><input type="hidden" class="pt1-existing-id" value="${eH(old?old.fileId:'')}"><input type="hidden" class="pt1-existing-name" value="${eH(old?old.fileName:'')}"><input type="hidden" class="pt1-existing-url" value="${eH(old?old.fileUrl:'')}"></div><button class="btn" disabled>หลัก</button></div>`;}).join('');
const customs=STATE.doc.detailItems.filter(i=>i.docType==='CUSTOM_ATTACHMENT').map((it,idx)=>createCustomAttachRowHtml_(it.itemName,it,idx));
html+=`<h4 style="margin:8px 0">เอกสารหลัก ปท.1</h4>${base}<h4 style="margin:14px 0 8px">รายการแนบเพิ่มเติม</h4><div id="customAttachArea">${customs.join('')}</div><button class="btn" onclick="addCustomAttachmentRow()">+ เพิ่มรายการแนบ</button>`;
body.innerHTML=html;
if(!customs.length)addCustomAttachmentRow();
}
function createCustomAttachRowHtml_(name,old,idx){const key='c'+(++STATE.doc.attachmentsSeq)+'_'+idx;return `<div class="attach-row custom-row" data-doctype="CUSTOM_ATTACHMENT" data-key="${key}"><input type="text" class="pt1-item-name" value="${eH(name||'')}" placeholder="ชื่อรายการแนบ"><div><input type="file" class="pt1-file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"><div class="small">${old&&old.fileName?`ไฟล์เดิม: ${eH(old.fileName)} <a href="${eH(old.fileUrl)}" target="_blank">ดูไฟล์</a>`:'ยังไม่มีไฟล์เดิม'}</div><input type="hidden" class="pt1-existing-id" value="${eH(old?old.fileId:'')}"><input type="hidden" class="pt1-existing-name" value="${eH(old?old.fileName:'')}"><input type="hidden" class="pt1-existing-url" value="${eH(old?old.fileUrl:'')}"></div><button class="btn danger" onclick="removeCustomAttachment('${key}')">ลบ</button></div>`;}
function addCustomAttachmentRow(){const area=document.getElementById('customAttachArea');if(!area)return;const div=document.createElement('div');div.innerHTML=createCustomAttachRowHtml_('',null,Date.now());area.appendChild(div.firstChild);} 
function removeCustomAttachment(key){const row=document.querySelector(`.custom-row[data-key="${CSS.escape(key)}"]`);if(row)row.remove();}

async function submitDocEdit(){try{setDocEditStatus('กำลังบันทึก...','warn');if(STATE.doc.category==='ASSESSMENT'){const old=STATE.doc.detailItems.find(i=>i.docType==='CONTROL_ASSESSMENT');const file=document.getElementById('assessmentFile').files[0];const payload={youthId:STATE.doc.youthId,note:document.getElementById('docNote').value.trim(),docCategory:'ASSESSMENT'};if(file)payload.file={base64Data:await fileToBase64(file),fileName:file.name,mimeType:file.type||'application/octet-stream'};const fn=STATE.doc.mode==='edit'?'updateAssessmentDocument':'saveAssessmentDocument';google.script.run.withSuccessHandler(r=>{setDocStatus(r.message,'success');closeDocEditModal();loadDocumentTable();}).withFailureHandler(e=>setDocEditStatus(e.message||e,'error'))[fn](payload);return;}
const rows=Array.from(document.querySelectorAll('#docEditBody .attach-row'));const items=[];for(const row of rows){const docType=row.dataset.doctype||'CUSTOM_ATTACHMENT';const itemName=(row.querySelector('.pt1-item-name').value||'').trim();const f=row.querySelector('.pt1-file').files[0];const existingFileId=row.querySelector('.pt1-existing-id').value||'';const existingFileName=row.querySelector('.pt1-existing-name').value||'';const existingFileUrl=row.querySelector('.pt1-existing-url').value||'';const obj={docType,itemName,existingFileId,existingFileName,existingFileUrl};if(f)obj.file={base64Data:await fileToBase64(f),fileName:f.name,mimeType:f.type||'application/octet-stream'};items.push(obj);}const payload={youthId:STATE.doc.youthId,docCategory:'PT1',note:document.getElementById('docNote').value.trim(),items};const fn=STATE.doc.mode==='edit'?'updatePt1Documents':'savePt1Documents';google.script.run.withSuccessHandler(r=>{setDocStatus(r.message,'success');closeDocEditModal();loadDocumentTable();}).withFailureHandler(e=>setDocEditStatus(e.message||e,'error'))[fn](payload);
}catch(err){setDocEditStatus(err.message||err,'error');}}

function closeDocViewModal(){document.getElementById('docViewModal').style.display='none';}

  document.getElementById('contentArea').innerHTML=`<h3 style="margin:0 0 6px">ตารางนัดกิจกรรม</h3><div class="badge ok">ปฏิทินกิจกรรมภาษาไทย + วันหยุด + แจ้งเตือน LINE</div>

function setCalendarStatus(msg,type){const el=document.getElementById('calendarStatus');if(!el)return;el.className='status '+(type||'');el.textContent=msg||'';}
function loadCalendarInitial(){google.script.run.withSuccessHandler(list=>{STATE.calendar.youthOptions=list||[];loadActivityCalendar();}).withFailureHandler(()=>loadActivityCalendar()).getYouthOptionsForActivity();}
function setCalendarView(v){STATE.calendar.view=v;renderActivityCalendarPage();loadActivityCalendar();}
function changeCalendarMonth(delta){const d=STATE.calendar.monthRef;STATE.calendar.monthRef=new Date(d.getFullYear(),d.getMonth()+delta,1);renderActivityCalendarPage();loadActivityCalendar();}
function goCalendarToday(){STATE.calendar.monthRef=new Date();renderActivityCalendarPage();loadActivityCalendar();}
function searchCalendar(){filterActivities();}
function loadCalendarData(){loadActivityCalendar();}
function loadActivityCalendar(){
  if(STATE.activeMenu!=='ตารางนัดกิจกรรม')return;
  const requestId=++CALENDAR_LOAD_SEQ;
  const d=STATE.calendar.monthRef;
  const y=d.getFullYear(),m=d.getMonth()+1;
  document.getElementById('calendarTitle').textContent=d.toLocaleDateString('th-TH',{month:'long',year:'numeric'});
  STATE.calendar.events=[];
  renderThaiMonthCalendar();
  renderCalendarList();
  setCalendarStatus('กำลังโหลดข้อมูล...','warn');
  console.log('[calendar] request',{year:y,month:m,requestId});
  const timeoutId=setTimeout(()=>{if(requestId!==CALENDAR_LOAD_SEQ||STATE.activeMenu!=='ตารางนัดกิจกรรม')return;setCalendarStatus('โหลดนานกว่าปกติ แต่ระบบยังไม่ค้าง สามารถเปลี่ยนเดือนหรือกดรีเฟรชได้','warn');console.log('[calendar] slow request',requestId);},12000);
  google.script.run.withSuccessHandler(res=>{
    if(requestId!==CALENDAR_LOAD_SEQ||STATE.activeMenu!=='ตารางนัดกิจกรรม')return;
    clearTimeout(timeoutId);
    console.log('[calendar] success raw',res);
    if(!res||res.success===false){
      const msg=(res&&res.message)?res.message:'โหลดข้อมูลปฏิทินไม่สำเร็จ';
      setCalendarStatus(msg,'error');
      STATE.calendar.events=[];
      renderThaiMonthCalendar();
      renderCalendarList();
      return;
    }
    let events=(res.events||[]);
    if(!events.length&&(res.activities||res.holidays)){
      events=(res.activities||[]).concat((res.holidays||[]).map(h=>({activityId:h.holidayId,eventType:'HOLIDAY',title:h.holidayName,holidayName:h.holidayName,holidayType:h.holidayType,eventDate:h.holidayDate,startDate:h.holidayDate,endDate:h.holidayDate,allDay:'TRUE',isHoliday:true,status:'active'})));
    }
    console.log('[calendar] parsed counts',{activities:(res.activities||[]).length,holidays:(res.holidays||[]).length,events:events.length,elapsedMs:res.elapsedMs});
    events=filterCalendarEventsClient(events);
    STATE.calendar.events=events;
    renderThaiMonthCalendar();
    renderCalendarList();
    const note=res.message?` (${res.message})`:'';
    setCalendarStatus('โหลดข้อมูลสำเร็จ '+events.length+' รายการ'+note,'success');
  }).withFailureHandler(e=>{
    if(requestId!==CALENDAR_LOAD_SEQ||STATE.activeMenu!=='ตารางนัดกิจกรรม')return;
    clearTimeout(timeoutId);
    const msg='โหลดข้อมูลปฏิทินไม่สำเร็จ: '+(e&&e.message?e.message:e);
    console.log('[calendar] failure',e);
    setCalendarStatus(msg,'error');
    STATE.calendar.events=[];
    renderThaiMonthCalendar();
    renderCalendarList();
  }).getActivityCalendarData({year:y,month:m,query:STATE.calendar.query,eventType:STATE.calendar.eventType});
}
function filterCalendarEventsClient(events){let out=events.slice();if(STATE.calendar.eventType)out=out.filter(e=>e.eventType===STATE.calendar.eventType);const role=(document.getElementById('calendarRoleFilter')||{}).value||'';const st=(document.getElementById('calendarStatusFilter')||{}).value||'';if(role)out=out.filter(e=>(e.roleType||'')===role);if(st)out=out.filter(e=>(e.status||'active')===st);if(STATE.calendar.query){const q=STATE.calendar.query.toLowerCase();out=out.filter(e=>[e.personName,e.roleType,e.youthNameSnapshot,e.title,e.taskOwner,e.description,e.location].join(' ').toLowerCase().includes(q));}return out;}
function renderCalendarView(){renderThaiMonthCalendar();renderCalendarList();}
function renderThaiMonthCalendar(){const d=STATE.calendar.monthRef;const first=new Date(d.getFullYear(),d.getMonth(),1);const startDay=(first.getDay()+6)%7;const daysInMonth=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();const map={};STATE.calendar.events.forEach(e=>{const s=toDateOnly(e.startDate||e.eventDate),en=toDateOnly(e.endDate||e.startDate||e.eventDate);for(let dd=new Date(s);dd<=en;dd.setDate(dd.getDate()+1)){const ds=formatYmd(dd);(map[ds]=map[ds]||[]).push(e);}});let html='<div class="table-wrap"><table><thead><tr><th>จันทร์</th><th>อังคาร</th><th>พุธ</th><th>พฤหัสบดี</th><th>ศุกร์</th><th style="background:#fff7ed">เสาร์</th><th style="background:#fee2e2">อาทิตย์</th></tr></thead><tbody>';let day=1-startDay;for(let w=0;w<6;w++){html+='<tr>';for(let c=0;c<7;c++,day++){if(day<1||day>daysInMonth){html+='<td style="height:140px;background:#f8fafc"></td>';continue;}const date=new Date(d.getFullYear(),d.getMonth(),day);const ds=formatYmd(date);const list=map[ds]||[];const isSat=c===5,isSun=c===6;html+=`<td style="vertical-align:top;height:140px;cursor:pointer;${isSat?'background:#fff7ed;':''}${isSun?'background:#fff1f2;':''}" onclick="openActivityModal('${ds}')"><div><strong>${day}</strong></div>${isSat||isSun?`<div class="small">${isSat?'วันเสาร์':'วันอาทิตย์'}</div>`:''}${list.filter(i=>i.eventType==='HOLIDAY').map(h=>renderHolidayBadge(h)).join('')}${list.filter(i=>i.eventType!=='HOLIDAY').slice(0,3).map(ev=>renderActivityTag(ev)).join('')}${list.filter(i=>i.eventType!=='HOLIDAY').length>3?`<button class="btn" style="margin-top:4px" onclick="event.stopPropagation();openDayAll('${ds}')">ดูทั้งหมด</button>`:''}</td>`;}html+='</tr>';}html+='</tbody></table></div>';document.getElementById('calendarViewArea').innerHTML=html;}

  if(document.getElementById('actCourtName'))payload.courtName=document.getElementById('actCourtName').value.trim();
  if(document.getElementById('actCourtMode'))payload.courtMode=document.getElementById('actCourtMode').value;
  if(document.getElementById('actHospitalName'))payload.hospitalName=document.getElementById('actHospitalName').value.trim();
  if(document.getElementById('actStaffNames'))payload.staffNames=document.getElementById('actStaffNames').value.trim();
  const fn=STATE.calendar.editId?'updateActivity':'saveActivity';

  }catch(err){setActivityFormStatus(err.message||err,'error');}
}

function setVisitMsg(msg,type){const el=document.getElementById('visitStatusMsg');if(!el)return;el.className='status '+(type||'');el.textContent=msg||'';}
function loadVisitDashboard(){if(STATE.activeMenu!=='งานญาติเยี่ยม')return;STATE.visit.query=(document.getElementById('visitSearch')||{}).value||STATE.visit.query;STATE.visit.gradeLevel=(document.getElementById('visitGrade')||{}).value||'';STATE.visit.statusFilter=(document.getElementById('visitStatus')||{}).value||'ALL';STATE.visit.month=Number((document.getElementById('visitMonth')||{}).value||STATE.visit.month);STATE.visit.year=Number((document.getElementById('visitYear')||{}).value||STATE.visit.year);setVisitMsg('กำลังโหลด...','warn');google.script.run.withSuccessHandler(res=>{const cards=res.cards||{};const tb=res.table||{items:[]};STATE.visit.rows=tb.items||[];renderVisitCards(cards);renderVisitTable();setVisitMsg('โหลดข้อมูลสำเร็จ','success');loadVisitMeta();}).withFailureHandler(e=>setVisitMsg(e.message||e,'error')).getVisitDashboardData({month:STATE.visit.month,year:STATE.visit.year-543,query:STATE.visit.query,gradeLevel:STATE.visit.gradeLevel,statusFilter:STATE.visit.statusFilter});}

function renderVisitCards(c){const el=document.getElementById('visitCards');if(!el)return;const defs=[['เด็กทั้งหมด',c.totalYouth||0],['ยังจองได้',c.canBook||0],['ใช้สิทธิครบ',c.fullUsed||0],['จองเดือนนี้',c.monthBookings||0],['สิทธิพิเศษใช้งาน',c.activeSpecialRules||0]];el.innerHTML=defs.map(d=>`<div class="card"><div class="small">${d[0]}</div><div style="font-size:24px;font-weight:700">${d[1]}</div></div>`).join('');}
function visitStatusBadge(row){if(row.statusKey==='FULL')return '<span class="badge" style="background:#fef2f2;color:#b91c1c;border:1px solid #fecaca">ใช้สิทธิครบแล้ว</span>';if(row.statusKey==='SPECIAL_AVAILABLE')return '<span class="badge" style="background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe">มีสิทธิพิเศษ</span>';if(row.remaining<=1)return '<span class="badge" style="background:#fffbeb;color:#b45309;border:1px solid #fde68a">เหลือน้อย</span>';return '<span class="badge" style="background:#ecfdf5;color:#15803d;border:1px solid #bbf7d0">ยังจองได้</span>';}

function parseDateClient(v){if(v instanceof Date&&!isNaN(v.getTime()))return new Date(v.getFullYear(),v.getMonth(),v.getDate());const s=String(v||'').trim();const m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m)return new Date(Number(m[1]),Number(m[2])-1,Number(m[3]));const d=new Date(s);return isNaN(d.getTime())?null:new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function toDateOnly(v){return parseDateClient(v)||new Date(1900,0,1);}
function formatYmd(v){const d=toDateOnly(v);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function toThaiDate(ymd){if(!ymd)return'-';const d=parseDateClient(ymd);if(!d)return'-';return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+(d.getFullYear()+543);}

function openVisitDetail(youthId){google.script.run.withSuccessHandler(res=>{const b=(res.bookings||[]).map(i=>`<tr><td>${toThaiDate(i.bookingDate)}</td><td>${i.quotaTypeUsed}</td><td>${eH(i.note||'')}</td><td><button class='btn danger' onclick="deleteVisitBookingClient('${eJ(i.bookingId)}')">ลบ</button></td></tr>`).join('')||'<tr><td colspan="4" class="center">ไม่มีประวัติ</td></tr>';showInlineModal('รายละเอียดสิทธิ',`<div class='small'>${eH(res.youth.fullName)} | ระดับ ${eH(res.youth.gradeLevel)}</div><div class='small'>พื้นฐาน ${res.baseQuota} + พิเศษ ${res.specialQuota} | ใช้ไป ${res.usedTotal} | คงเหลือ ${res.remaining}</div><div class='table-wrap'><table><thead><tr><th>วันที่</th><th>ประเภทสิทธิ</th><th>หมายเหตุ</th><th>จัดการ</th></tr></thead><tbody>${b}</tbody></table></div>`,()=>{closeInlineModal();},'');setTimeout(fillSpecialScopeSelect,0);}).withFailureHandler(e=>setVisitMsg(e.message||e,'error')).getVisitDetailByYouthId(youthId,STATE.visit.month,STATE.visit.year-543);}
function deleteVisitBookingClient(id){if(!confirm('ยืนยันลบการจองนี้?'))return;google.script.run.withSuccessHandler(()=>{closeInlineModal();loadVisitDashboard();}).withFailureHandler(e=>alert(e.message||e)).deleteVisitBooking(id);}

function openQuotaRuleModal(){if(!(STATE.visit.gradeOptions||[]).length){setVisitMsg('ยังไม่มีระดับชั้นในระบบ กรุณาเพิ่มข้อมูลเด็กและเยาวชนก่อน','error');return;}const rows=(STATE.visit.quotaRules||[]).map(r=>`<tr><td>${eH(r.gradeLevel)}</td><td>${r.allowedPerMonth}</td><td>${eH(r.status)}</td><td><button class='btn' onclick="editQuotaRule('${eJ(r.ruleId)}')">แก้ไข</button><button class='btn danger' onclick="deleteQuotaRuleClient('${eJ(r.ruleId)}')">ลบ</button></td></tr>`).join('')||'<tr><td colspan="4" class="center">ไม่มีข้อมูล</td></tr>';showInlineModal('ตั้งค่าสิทธิระดับชั้น',`<div class='grid-2'><select id='qrGrade'><option value=''>ระดับชั้น</option>${(STATE.visit.gradeOptions||[]).map(g=>`<option value='${eH(g)}'>${eH(g)}</option>`).join('')}</select><input id='qrAllowed' type='number' placeholder='สิทธิ/เดือน'></div><div class='toolbar2'><button class='btn primary' onclick='saveQuotaRuleClient()'>เพิ่ม</button></div><div class='table-wrap'><table><thead><tr><th>ระดับชั้น</th><th>สิทธิ/เดือน</th><th>สถานะ</th><th>จัดการ</th></tr></thead><tbody>${rows}</tbody></table></div>`,()=>{closeInlineModal();loadVisitMeta();},'');setTimeout(fillSpecialScopeSelect,0);}
function saveQuotaRuleClient(){google.script.run.withSuccessHandler(()=>{closeInlineModal();loadVisitMeta();openQuotaRuleModal();}).withFailureHandler(e=>alert(e.message||e)).saveVisitQuotaRule({gradeLevel:normalizeGradeClient(document.getElementById('qrGrade').value),allowedPerMonth:document.getElementById('qrAllowed').value});}
function deleteQuotaRuleClient(id){if(!confirm('ยืนยันลบกติกาสิทธิปกติ?'))return;google.script.run.withSuccessHandler(()=>{loadVisitMeta();openQuotaRuleModal();}).withFailureHandler(e=>alert(e.message||e)).deleteNormalQuota(id);}
function editQuotaRule(id){const r=(STATE.visit.quotaRules||[]).find(i=>i.ruleId===id);if(!r)return;showInlineModal('แก้ไขกติกา',`<select id='qrEG'>${(STATE.visit.gradeOptions||[]).map(g=>`<option value='${eH(g)}' ${r.gradeLevel===g?'selected':''}>${eH(g)}</option>`).join('')}</select><input id='qrEA' type='number' value='${r.allowedPerMonth}'>`,()=>{google.script.run.withSuccessHandler(()=>{closeInlineModal();loadVisitMeta();openQuotaRuleModal();}).withFailureHandler(e=>alert(e.message||e)).updateVisitQuotaRule({ruleId:id,gradeLevel:normalizeGradeClient(document.getElementById('qrEG').value),allowedPerMonth:document.getElementById('qrEA').value,status:'active'});},'บันทึก');}

function openSpecialRuleModal(){if(!(STATE.visit.gradeOptions||[]).length){setVisitMsg('ยังไม่มีระดับชั้นในระบบ กรุณาเพิ่มข้อมูลเด็กและเยาวชนก่อน','error');return;}const rows=(STATE.visit.specialRules||[]).map(r=>`<tr><td>${eH(r.ruleName)}</td><td>${eH(r.gradeLevelScope)}</td><td>${r.extraQuota}</td><td>${toThaiDate(r.startDate)} - ${toThaiDate(r.endDate)}</td><td>${eH(r.status)}</td><td><button class='btn' onclick="editSpecialRuleClient('${eJ(r.specialRuleId)}')">แก้ไข</button><button class='btn danger' onclick="deleteSpecialRuleClient('${eJ(r.specialRuleId)}')">ลบ</button></td></tr>`).join('')||'<tr><td colspan="5" class="center">ไม่มีข้อมูล</td></tr>';showInlineModal('ตั้งค่าสิทธิพิเศษ',`<div class='grid-2'><input id='srName' placeholder='ชื่อสิทธิพิเศษ'><select id='srScope' multiple></select></div><div class='grid-2'><input id='srExtra' type='number' placeholder='เพิ่มสิทธิ'><input id='srStart' type='date'></div><div class='grid-2'><input id='srEnd' type='date'><input id='srNote' placeholder='หมายเหตุ'></div><button class='btn primary' onclick='saveSpecialRuleClient()'>เพิ่ม</button><div class='table-wrap'><table><thead><tr><th>ชื่อ</th><th>ระดับที่ใช้</th><th>เพิ่มสิทธิ</th><th>ช่วงวันที่</th><th>สถานะ</th><th>จัดการ</th></tr></thead><tbody>${rows}</tbody></table></div>`,()=>{closeInlineModal();loadVisitMeta();},'');setTimeout(fillSpecialScopeSelect,0);}
function deleteSpecialRuleClient(id){if(!confirm('ยืนยันลบสิทธิพิเศษ?'))return;google.script.run.withSuccessHandler(()=>{loadVisitMeta();openSpecialRuleModal();}).withFailureHandler(e=>alert(e.message||e)).deleteSpecialQuota(id);}
function editSpecialRuleClient(id){const r=(STATE.visit.specialRules||[]).find(x=>x.specialRuleId===id);if(!r)return;showInlineModal('แก้ไขสิทธิพิเศษ',`<input id='esrName' value='${eH(r.ruleName)}'><input id='esrExtra' type='number' value='${r.extraQuota}'><input id='esrStart' type='date' value='${r.startDate}'><input id='esrEnd' type='date' value='${r.endDate}'><input id='esrScope' value='${eH(r.gradeLevelScope)}'><input id='esrNote' value='${eH(r.note||'')}'><div class='small'>gradeLevelScope ต้องมาจากค่าที่มีในระบบ เช่น ALL หรือค่าจาก dropdown</div>`,()=>{google.script.run.withSuccessHandler(()=>{closeInlineModal();loadVisitMeta();openSpecialRuleModal();}).withFailureHandler(e=>alert(e.message||e)).updateVisitSpecialRule({specialRuleId:id,ruleName:document.getElementById('esrName').value,gradeLevelScope:document.getElementById('esrScope').value,extraQuota:document.getElementById('esrExtra').value,startDate:document.getElementById('esrStart').value,endDate:document.getElementById('esrEnd').value,note:document.getElementById('esrNote').value,status:'active'});},'บันทึก');}
function fillSpecialScopeSelect(){const sel=document.getElementById('srScope');if(!sel)return;const g=STATE.visit.gradeOptions||[];sel.innerHTML='<option value="ALL">ALL (ทุกระดับ)</option>'+g.map(v=>`<option value="${eH(v)}">ระดับ ${eH(v)}</option>`).join('');}

function saveSpecialRuleClient(){google.script.run.withSuccessHandler(()=>{closeInlineModal();loadVisitMeta();openSpecialRuleModal();}).withFailureHandler(e=>alert(e.message||e)).saveVisitSpecialRule({ruleName:document.getElementById('srName').value,gradeLevelScope:(()=>{const sel=document.getElementById('srScope');const vals=Array.from(sel.selectedOptions).map(o=>o.value);if(!vals.length||vals.indexOf('ALL')>-1)return 'ALL';return vals.join(',');})(),extraQuota:document.getElementById('srExtra').value,startDate:document.getElementById('srStart').value,endDate:document.getElementById('srEnd').value,note:document.getElementById('srNote').value,status:'active'});}

function openVisitImportModal(){document.getElementById('visitImportFile').click();document.getElementById('visitImportFile').onchange=async()=>{const f=document.getElementById('visitImportFile').files[0];if(!f)return;const base64=await fileToBase64(f);google.script.run.withSuccessHandler(res=>{STATE.visit.importPreview=res.items||[];renderVisitImportPreview();}).withFailureHandler(e=>setVisitMsg(e.message||e,'error')).importVisitBookingsPreview(base64,f.name,f.type||'application/octet-stream',formatYmd(new Date()));};}
function renderVisitImportPreview(){const youthOpts=(STATE.visit.youthOptions||[]).map(y=>`<option value="${eH(y.youthId)}">${eH(y.fullName)}</option>`).join('');const rows=STATE.visit.importPreview.map((r,i)=>`<tr><td>${i+1}</td><td>${eH(r.excelName)}</td><td><select onchange="updateImportYouth(${i},this.value)"><option value=''>--เลือก--</option>${youthOpts}</select></td><td><input type='date' value='${eH(r.bookingDate||formatYmd(new Date()))}' onchange="updateImportDate(${i},this.value)"></td><td>${r.canBook?'จองได้':'จองไม่ได้'}</td><td>${eH(r.note||'')}</td><td><button class='btn danger' onclick='removeImportRow(${i})'>×</button></td></tr>`).join('');const sum={t:STATE.visit.importPreview.length,ok:STATE.visit.importPreview.filter(i=>i.canBook).length,no:STATE.visit.importPreview.filter(i=>!i.canBook).length,nom:STATE.visit.importPreview.filter(i=>!i.youthId).length};showInlineModal('ตรวจสอบก่อนยืนยันนำเข้า',`<div class='small'>ทั้งหมด ${sum.t} | จองได้ ${sum.ok} | จองไม่ได้ ${sum.no} | ยังไม่จับคู่ ${sum.nom}</div><div class='table-wrap'><table><thead><tr><th>#</th><th>ชื่อจาก Excel</th><th>จับคู่ชื่อ</th><th>วันที่จอง</th><th>สถานะสิทธิ</th><th>หมายเหตุ</th><th>ลบ</th></tr></thead><tbody>${rows}</tbody></table></div>`,()=>{const items=STATE.visit.importPreview.map(it=>Object.assign({},it,{keep:true}));google.script.run.withSuccessHandler(r=>{closeInlineModal();setVisitMsg('นำเข้าสำเร็จ เพิ่ม '+r.inserted+' รายการ','success');loadVisitDashboard();}).withFailureHandler(e=>alert(e.message||e)).confirmImportVisitBookings({items:items});},'ยืนยันนำเข้า');}
function updateImportYouth(i,yid){STATE.visit.importPreview[i].youthId=yid;const y=(STATE.visit.youthOptions||[]).find(v=>v.youthId===yid);STATE.visit.importPreview[i].matchedName=y?y.fullName:'';}
function updateImportDate(i,d){STATE.visit.importPreview[i].bookingDate=d;}
function removeImportRow(i){STATE.visit.importPreview.splice(i,1);renderVisitImportPreview();}

function openDeleteAllVisitModal(){showInlineModal('ลบการจองทั้งหมด',`<div style='color:#b91c1c;font-weight:700'>คำเตือน: การลบนี้จะกระทบการคำนวณสิทธิ</div><div class='field'><label>ขอบเขต</label><select id='delScope'><option value='MONTH_YEAR'>ลบเฉพาะเดือน/ปีที่กำลังดู</option><option value='ALL'>ลบทั้งหมดทุกเดือนทุกปี</option></select></div><div class='small'>ต้องยืนยันอีกครั้งก่อนลบจริง</div>`,()=>{if(!confirm('ยืนยันอีกครั้งว่าต้องการลบข้อมูลการจองตามเงื่อนไขนี้?'))return;google.script.run.withSuccessHandler(r=>{closeInlineModal();setVisitMsg('ลบสำเร็จ '+r.deletedCount+' รายการ','success');loadVisitDashboard();}).withFailureHandler(e=>alert(e.message||e)).deleteAllVisitBookings({deleteScope:document.getElementById('delScope').value,month:STATE.visit.month,year:STATE.visit.year-543});},'ยืนยันลบ');}

function showInlineModal(title,body,okFn,okText){const id='inlineVisitModal';const old=document.getElementById(id);if(old)old.remove();const hasOk=!!(okText||'').trim();const wrap=document.createElement('div');wrap.id=id;wrap.className='modal-backdrop';wrap.style.display='flex';wrap.innerHTML=`<div class='modal'><h3>${title}</h3><div>${body}</div><div class='modal-footer'><button class='btn' onclick='closeInlineModal()'>ปิด</button>${hasOk?`<button class='btn primary' id='inlineOkBtn'>${okText}</button>`:''}</div></div>`;document.body.appendChild(wrap);if(hasOk&&okFn)document.getElementById('inlineOkBtn').onclick=okFn;}
function closeInlineModal(){const e=document.getElementById('inlineVisitModal');if(e)e.remove();}

function normalizeGradeClient(v){return String(v||'').trim();}

function fileToBase64(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>{const s=String(r.result||'');resolve(s.includes(',')?s.split(',')[1]:s);};r.onerror=reject;r.readAsDataURL(file);});}
function eH(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function eJ(v){return String(v||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');}
</script>
</body>
</html>
